<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerberus OS — Plant Dashboard</title>
    <meta name="description" content="Real-time industrial plant safety dashboard with zone monitoring, alerts, and permit management.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 50% { box-shadow: 0 0 20px 6px rgba(239, 68, 68, 0.35); } }
        .pulse-red { animation: pulse-red 2s ease-in-out infinite; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fade-in 0.4s ease-out; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#111827',
                        card: '#1f2937',
                        cardHover: '#374151',
                        accent: '#10b981',
                        danger: '#ef4444',
                        dangerDark: '#991b1b',
                        muted: '#9ca3af',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-gray-100 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-card/80 backdrop-blur border-b border-gray-700/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-accent animate-pulse"></div>
                <span class="font-bold text-lg tracking-tight">CERBERUS OS</span>
                <span class="text-xs text-muted bg-gray-800 px-2 py-0.5 rounded-full ml-1">LIVE</span>
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="index.html" class="text-accent border-b-2 border-accent pb-0.5">Dashboard</a>
                <a href="compliance.html" class="text-muted hover:text-gray-100 transition-colors">Audit Log</a>
                <a href="copilot.html" class="text-muted hover:text-gray-100 transition-colors">Operator Portal</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8" x-data="dashboard()">

        <!-- Page Title -->
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight">Plant Dashboard</h1>
            <p class="text-muted text-sm mt-1">Real-time zone monitoring &amp; permit management</p>
        </div>

        <!-- Zone Grid -->
        <section class="mb-10">
            <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-4">Zone Status</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <template x-for="zone in zones" :key="zone.id">
                    <div :class="zone.status === 'violation'
                            ? 'bg-gradient-to-br from-red-900/60 to-red-950/80 border-red-500/40 pulse-red'
                            : 'bg-gradient-to-br from-emerald-900/30 to-emerald-950/50 border-emerald-500/30'"
                         class="border rounded-xl p-5 transition-all duration-500 cursor-default">
                        <div class="flex items-center justify-between mb-3">
                            <span class="font-mono text-sm font-semibold tracking-wide" x-text="zone.id"></span>
                            <span :class="zone.status === 'violation' ? 'bg-red-500' : 'bg-emerald-500'"
                                  class="w-2.5 h-2.5 rounded-full"></span>
                        </div>
                        <span :class="zone.status === 'violation' ? 'text-red-400' : 'text-emerald-400'"
                              class="text-xs font-semibold uppercase tracking-widest"
                              x-text="zone.status === 'violation' ? '⚠ VIOLATION' : '✓ CLEAR'"></span>
                    </div>
                </template>
            </div>
        </section>

        <!-- Latest Alert -->
        <section class="mb-10">
            <template x-if="latestAlert">
                <div>
                    <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-4">Latest Alert</h2>
                    <div class="bg-card border border-gray-700/50 rounded-xl p-6 fade-in">
                        <div class="flex items-start gap-4">
                            <div class="bg-red-500/20 text-red-400 rounded-lg p-3 flex-shrink-0">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                                <div>
                                    <span class="text-muted block text-xs mb-1">Status</span>
                                    <span class="font-semibold" :class="latestAlert.status_code === 'CRITICAL_HAZARD_VIOLATION' ? 'text-red-400' : 'text-emerald-400'" x-text="latestAlert.status_code"></span>
                                </div>
                                <div>
                                    <span class="text-muted block text-xs mb-1">Zone</span>
                                    <span class="font-mono font-semibold" x-text="latestAlert.zone || '—'"></span>
                                </div>
                                <div>
                                    <span class="text-muted block text-xs mb-1">Gas / PPM</span>
                                    <span class="font-semibold" x-text="(latestAlert.gas_type || '—') + ' @ ' + (latestAlert.gas_ppm ?? '—') + ' PPM'"></span>
                                </div>
                                <div class="col-span-2 md:col-span-1">
                                    <span class="text-muted block text-xs mb-1">Reason</span>
                                    <span class="font-medium text-gray-300" x-text="latestAlert.reason || '—'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </section>

        <!-- Two-Column: Permit Form + Revoke -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Permit Registration -->
            <div class="bg-card border border-gray-700/50 rounded-xl p-6">
                <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-5">Register Permit</h2>
                <form @submit.prevent="registerPermit()" class="space-y-4">
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Zone ID</label>
                        <select x-model="permitForm.zone_id" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
                            <option value="">Select zone…</option>
                            <option value="battery_4">battery_4</option>
                            <option value="battery_3">battery_3</option>
                            <option value="pump_station_p3a">pump_station_p3a</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Work Type</label>
                        <select x-model="permitForm.work_type" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
                            <option value="">Select type…</option>
                            <option value="HOT_WORK">Hot Work</option>
                            <option value="CONFINED_SPACE">Confined Space</option>
                            <option value="ELECTRICAL">Electrical</option>
                            <option value="COLD_WORK">Cold Work</option>
                            <option value="WELDING">Welding</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Assigned Team</label>
                        <input type="text" x-model="permitForm.assigned_team" required placeholder="e.g. Contractor Team B"
                               class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors placeholder-gray-500">
                    </div>
                    <button type="submit"
                            class="w-full bg-accent hover:bg-emerald-600 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors active:scale-[0.98]"
                            :disabled="permitLoading">
                        <span x-show="!permitLoading">Register Permit</span>
                        <span x-show="permitLoading">Registering…</span>
                    </button>
                    <p x-show="permitMsg" x-text="permitMsg" class="text-xs mt-2 fade-in"
                       :class="permitError ? 'text-red-400' : 'text-emerald-400'"></p>
                </form>
            </div>

            <!-- Revoke Permit -->
            <div class="bg-card border border-gray-700/50 rounded-xl p-6">
                <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-5">Revoke Permit</h2>
                <form @submit.prevent="revokePermit()" class="space-y-4">
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Zone ID</label>
                        <select x-model="revokeForm.zone_id" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
                            <option value="">Select zone…</option>
                            <option value="battery_4">battery_4</option>
                            <option value="battery_3">battery_3</option>
                            <option value="pump_station_p3a">pump_station_p3a</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Work Type</label>
                        <select x-model="revokeForm.work_type" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors">
                            <option value="">Select type…</option>
                            <option value="HOT_WORK">Hot Work</option>
                            <option value="CONFINED_SPACE">Confined Space</option>
                            <option value="ELECTRICAL">Electrical</option>
                            <option value="COLD_WORK">Cold Work</option>
                            <option value="WELDING">Welding</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-muted mb-1.5 font-medium">Assigned Team</label>
                        <input type="text" x-model="revokeForm.assigned_team" required placeholder="e.g. Contractor Team B"
                               class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-colors placeholder-gray-500">
                    </div>
                    <button type="submit"
                            class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors active:scale-[0.98]"
                            :disabled="revokeLoading">
                        <span x-show="!revokeLoading">Revoke Permit</span>
                        <span x-show="revokeLoading">Revoking…</span>
                    </button>
                    <p x-show="revokeMsg" x-text="revokeMsg" class="text-xs mt-2 fade-in"
                       :class="revokeError ? 'text-red-400' : 'text-emerald-400'"></p>
                </form>
            </div>

        </section>

    </main>

    <script>
        const API = 'http://localhost:8000';

        function dashboard() {
            return {
                zones: [
                    { id: 'battery_4', status: 'clear' },
                    { id: 'battery_3', status: 'clear' },
                    { id: 'pump_station_p3a', status: 'clear' },
                ],
                latestAlert: null,
                permitForm: { zone_id: '', work_type: '', assigned_team: '' },
                permitLoading: false,
                permitMsg: '',
                permitError: false,
                revokeForm: { zone_id: '', work_type: '', assigned_team: '' },
                revokeLoading: false,
                revokeMsg: '',
                revokeError: false,

                init() {
                    this.connectSSE();
                    this.fetchLatestAlert();
                },

                connectSSE() {
                    const es = new EventSource(`${API}/alerts/stream`);
                    es.onmessage = (event) => {
                        try {
                            const alert = JSON.parse(event.data);
                            this.latestAlert = alert;
                            // Flip zone to violation
                            const zone = this.zones.find(z => z.id === alert.zone);
                            if (zone) {
                                zone.status = alert.status_code === 'CRITICAL_HAZARD_VIOLATION' ? 'violation' : 'clear';
                            }
                        } catch (e) {
                            console.error('SSE parse error', e);
                        }
                    };
                    es.onerror = () => {
                        console.warn('SSE connection lost, reconnecting…');
                    };
                },

                async fetchLatestAlert() {
                    try {
                        const res = await fetch(`${API}/alerts/latest`);
                        const data = await res.json();
                        if (data && data.status_code) {
                            this.latestAlert = data;
                            const zone = this.zones.find(z => z.id === data.zone);
                            if (zone) {
                                zone.status = data.status_code === 'CRITICAL_HAZARD_VIOLATION' ? 'violation' : 'clear';
                            }
                        }
                    } catch (e) { /* API may not be up yet */ }
                },

                async registerPermit() {
                    this.permitLoading = true;
                    this.permitMsg = '';
                    try {
                        const res = await fetch(`${API}/permit/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.permitForm),
                        });
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        this.permitMsg = `✓ Permit ${data.permit_id} registered`;
                        this.permitError = false;
                        this.permitForm = { zone_id: '', work_type: '', assigned_team: '' };
                    } catch (e) {
                        this.permitMsg = `✗ ${e.message}`;
                        this.permitError = true;
                    } finally {
                        this.permitLoading = false;
                    }
                },

                async revokePermit() {
                    this.revokeLoading = true;
                    this.revokeMsg = '';
                    try {
                        const res = await fetch(`${API}/permit/revoke`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.revokeForm),
                        });
                        if (!res.ok) throw new Error(await res.text());
                        this.revokeMsg = '✓ Permit revoked successfully';
                        this.revokeError = false;
                        this.revokeForm = { zone_id: '', work_type: '', assigned_team: '' };
                    } catch (e) {
                        this.revokeMsg = `✗ ${e.message}`;
                        this.revokeError = true;
                    } finally {
                        this.revokeLoading = false;
                    }
                },
            };
        }
    </script>
</body>
</html>
